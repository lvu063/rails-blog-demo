# .github/workflows/ci.yml
# CI/CD pipeline for Rails Blog Demo
# Demonstrates: automated testing, linting, and deployment readiness checks
# Closes gap: CI/CD tools (Jenkins equivalent via GitHub Actions)

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Job 1: Run tests ────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      # Rails needs a database — SQLite works without a service
      # but this pattern shows awareness of service containers (like Jenkins stages)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true   # caches gems between runs

      - name: Set up database
        run: |
          bin/rails db:create
          bin/rails db:migrate
        env:
          RAILS_ENV: test

      - name: Run tests
        run: bin/rails test
        env:
          RAILS_ENV: test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test/reports/

  # ── Job 2: Security scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test   # only runs if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run Brakeman security scan
        run: |
          gem install brakeman
          brakeman --no-pager --format json --output brakeman-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-report
          path: brakeman-report.json

  # ── Job 3: Build Docker image ───────────────────────────────────────────────
  # Verifies the app containerises correctly on every push
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rails-blog-demo:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d -p 3000:3000 --name test-container \
            -e RAILS_ENV=production \
            -e SECRET_KEY_BASE=test_key_only_for_ci \
            rails-blog-demo:${{ github.sha }}
          sleep 5
          # Verify container started
          docker ps | grep test-container
          docker stop test-container
